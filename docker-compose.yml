name: fuckoai

services:
  fuckoai:
    build:
      context: .
    container_name: fuckoai
    init: true
    restart: unless-stopped
    network_mode: host
    environment:
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./server.py:/app/server.py:ro
      - ./uc_signup.py:/app/uc_signup.py:ro
      - ./control_panel.html:/app/control_panel.html:ro
      - ./config.json:/app/config.json
      - ./data:/app/data
